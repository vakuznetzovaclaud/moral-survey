<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Моральные дилеммы — эксперимент</title>
  <style>
    :root {
      --bg: #f6f7fb; --card: #ffffff; --text: #1f2937; --muted: #6b7280;
      --border: #dbe2ea; --accent: #2563eb; --accent-2: #eff6ff;
      --ok: #166534; --ok-bg: #f0fdf4; --danger: #b91c1c;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Inter, Arial, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }
    .wrap { max-width: 920px; margin: 0 auto; padding: 24px 16px 48px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.04); margin-bottom: 16px; }
    h1, h2, h3 { margin-top: 0; }
    .muted { color: var(--muted); }
    .hidden { display: none; }
    label { display: block; font-weight: 600; margin-bottom: 8px; }
    input[type="text"], input[type="number"], select { width: 100%; padding: 12px 14px; border-radius: 10px; border: 1px solid var(--border); font-size: 15px; background: white; }
    .radio-group, .likert { display: grid; gap: 10px; margin-top: 10px; }
    .radio-option { border: 1px solid var(--border); border-radius: 12px; padding: 14px; cursor: pointer; background: white; }
    .radio-option input { margin-right: 10px; }
    .likert { grid-template-columns: repeat(7, 1fr); }
    .likert label { font-weight: 500; text-align: center; border: 1px solid var(--border); border-radius: 10px; padding: 10px 4px; margin: 0; background: white; cursor: pointer; }
    .actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px; flex-wrap: wrap; }
    button { appearance: none; border: 0; background: var(--accent); color: white; border-radius: 12px; padding: 12px 16px; font-size: 15px; cursor: pointer; }
    button:disabled { opacity: .7; cursor: not-allowed; }
    .advisor { border: 1px solid #bfdbfe; background: var(--accent-2); border-radius: 14px; padding: 16px; margin-top: 18px; }
    .progress { height: 10px; width: 100%; background: #e5e7eb; border-radius: 999px; overflow: hidden; margin-bottom: 16px; }
    .progress > div { height: 100%; background: var(--accent); width: 0%; transition: width .25s ease; }
    .small { font-size: 14px; }
    .error { color: var(--danger); font-weight: 600; margin-top: 10px; }
    .success { background: var(--ok-bg); border: 1px solid #bbf7d0; color: var(--ok); }
    .summary pre { white-space: pre-wrap; word-break: break-word; background: #f8fafc; border: 1px solid var(--border); border-radius: 12px; padding: 12px; overflow: auto; max-height: 320px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="progress"><div id="progressBar"></div></div>
    <div id="app"></div>
  </div>

<script>
const STORAGE_KEY = "moral_experiment_fixed_assignment_v1";
const RESULTS_KEY = "moral_experiment_fixed_results_v1";
const GOOGLE_SCRIPT_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbykduRvpkLkzhJd6cXAFQGI3JqkKuCynGMmUE5hZ_GIkIPcuSOo4bDbQpIYaQqXyZ0/exec";

function nowISO() { return new Date().toISOString(); }
function downloadFile(filename, content, mimeType) {
  const blob = new Blob([content], { type: mimeType });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename; a.click(); URL.revokeObjectURL(url);
}
function getOrAssignGroup() {
  let stored = localStorage.getItem(STORAGE_KEY);
  if (stored) return JSON.parse(stored);
  const groupNumber = Math.floor(Math.random() * 18) + 1;
  const advisorType = groupNumber <= 9 ? "ai" : "human";
  const patternIndex = (groupNumber - 1) % 9;
  const oppositeEverydayIndex = Math.floor(patternIndex / 3);
  const oppositeClassicIndex = patternIndex % 3;
  const assignment = { groupNumber, advisorType, patternIndex: patternIndex + 1, oppositeEverydayIndex, oppositeClassicIndex, createdAt: nowISO() };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(assignment));
  return assignment;
}
const advisorLabels = {
  ai: "Рекомендация ИИ (чат-бота, работающего на основе одной из современных моделей искусственного интеллекта)",
  human: "Рекомендация эксперта-философа"
};
const preQuestions = [
  { id: "gender", type: "select", label: "Пол", options: ["Женский", "Мужской", "Небинарный / другой", "Предпочитаю не указывать"] },
  { id: "age", type: "number", label: "Возраст", min: 14, max: 120 },
  { id: "education_level", type: "select", label: "Уровень образования", options: ["Среднее общее", "Среднее профессиональное", "Неоконченное высшее", "Высшее", "Магистратура / специалитет", "Аспирантура / ученая степень", "Другое"] },
  { id: "education_profile", type: "select", label: "Укажите Ваш профиль образования / сферу занятости", options: ["Гуманитарные науки", "Социальные науки", "Психология/Философия", "Естественные науки", "Технические/инженерные", "ИТ/разработка/данные", "Медицина/био", "Экономика/бизнес/менеджмент", "Другое"] },
  { id: "employment_status", type: "select", label: "Ваш текущий статус занятости", options: ["Учусь", "Работаю", "Учусь и работаю", "Не учусь и не работаю", "Другое"] }
];
const postQuestions = [
  { id: "ai_usage", type: "select", label: "Как часто вы используете системы искусственного интеллекта?", options: ["Несколько раз в день", "Примерно раз в день", "Несколько раз в неделю", "Реже раза в неделю", "Практически не использую"] },
  { id: "ai_trust", type: "likert", label: "Насколько вы доверяете искусственному интеллекту?", scaleMin: 1, scaleMax: 7, left: "Совсем не доверяю", right: "Полностью доверяю" },
  { id: "ai_agent", type: "select_with_other", label: "Каким ИИ агентом вы чаще всего пользуетесь?", options: ["ChatGPT", "Claude", "Gemini", "Grok", "YandexGPT", "Perplexity", "Copilot", "Не пользуюсь", "Другое"] }
];
const dilemmas = [
  { blockId: "everyday", localIndex: 1, globalIndex: 1, id: "cashier", text: "Вы стоите на кассе в супермаркете и собираетесь оплатить покупки на сумму 800 рублей. Вы даете кассиру купюру 1000 рублей. По ошибке она возвращает вам 400 рублей вместо 200. Что вы сделаете?", options: { A: "Вы вернете деньги.", B: "Вы не вернете деньги." }, justifications: { A: "Я бы вернул деньги, потому что общество держится на взаимном доверии, и даже небольшая выгода за счёт ошибки другого его подрывает. Честность в таких ситуациях — основа справедливости в обществе.", B: "Я бы оставил деньги себе, потому что в повседневной жизни крупные корпорации нередко получают выгоду из наших ошибок, и удержание переплаты может восприниматься как способ восстановить баланс в пользу обычного человека." } },
  { blockId: "everyday", localIndex: 2, globalIndex: 2, id: "bus", text: "Вы бежите, чтобы успеть на автобус, который сейчас уезжает и ходит только раз в час. Перед вами у женщины с двумя маленькими детьми из сумки выпадают вещи. Кроме вас, вокруг нет никого, кто мог бы ей помочь. Что вы сделаете?", options: { A: "Вы поможете женщине.", B: "Вы не поможете женщине." }, justifications: { A: "Я бы помог женщине, потому что помощь в ситуации очевидной нужды укрепляет доверие и взаимную поддержку между людьми. Именно благодаря таким поступкам формируются солидарность и чувство безопасности, на которых держится общество.", B: "Я бы побежал к автобусу, потому что забота о собственных планах и обязательствах также имеет значение. Не каждая ситуация требует самопожертвования, такие случаи важно оценивать с учётом разумного баланса между личными обязанностями и помощью другим." } },
  { blockId: "everyday", localIndex: 3, globalIndex: 3, id: "wardrobe", text: "Вы разместили объявление о продаже шкафа. Женщина, которая собирается забрать его на следующей неделе, предлагает заплатить 14000 рублей, и вы соглашаетесь. Вскоре после этого вам звонит другой человек и предлагает 20000 рублей. Что вы сделаете?", options: { A: "Вы сдержите своё обещание.", B: "Вы не сдержите своё обещание." }, justifications: { A: "Я бы сдержал своё обещание, потому что добровольно данное слово создаёт обязательство, на котором держится доверие в обществе. Я бы рекомендовал считать обещания морально обязывающими, даже при появлении более выгодных альтернатив.", B: "Я бы продал шкаф дороже, потому что до окончательного завершения сделки стороны сохраняют возможность пересмотреть условия, а стремление к более выгодному исходу может считаться допустимым мотивом." } },
  { blockId: "classic", localIndex: 1, globalIndex: 4, id: "restaurant", text: "Вы ужинаете с друзьями в ресторане. В помещение входит преступник с автоматом. Он угрожает расстрелять столик, за которым сидит семья из шести человек, если ему не заплатят большую сумму денег. Вы понимаете, что у нападавшего психические проблемы и любые попытки договориться будут бесполезны. Рядом с вами стоит мужчина. Вы можете толкнуть этого мужчину в сторону преступника, чтобы тот выстрелил в него. Вы знаете, что этот человек погибнет, но у шести человек будет время убежать. Что вы сделаете?", options: { A: "Вы толкнёте мужчину.", B: "Вы не будете его толкать." }, justifications: { A: "Я бы толкнул мужчину, потому что спасение большего числа жизней может рассматриваться как приоритетное, если нет иных средств предотвратить гибель. В такой ситуации сохранение большего числа людей перевешивает моральную сложность самого поступка.", B: "Я бы не толкал мужчину, потому что использование человека как средства для спасения других нарушает принцип уважения к личности. Важно придерживаться простого морального ориентира: не жертвовать одним человеком ради других, даже перед лицом тяжёлых последствий." } },
  { blockId: "classic", localIndex: 2, globalIndex: 5, id: "tram", text: "Вы идёте на работу и вместе с другими людьми ждёте трамвай на остановке. Вы замечаете, что у трамвая, который быстро приближается, отказали тормоза и он вот-вот врежется в группу из пяти человек, которые переходят дорогу и не замечают опасности. Рядом с вами стоит незнакомый человек. Вы можете толкнуть этого человека под трамвай, чтобы его тело замедлило движение. Вы знаете, что он погибнет, но пять человек останутся невредимыми. Что вы сделаете?", options: { A: "Вы толкнёте человека.", B: "Вы не будете его толкать." }, justifications: { A: "Я бы толкнул человека, потому что при отсутствии других вариантов спасение пяти жизней может считаться морально предпочтительным исходом. Но такие случаи исключительны и не должны становиться нормой поведения.", B: "Я бы не толкал человека, потому что прямое использование его тела как средства нарушает моральный запрет на преднамеренное убийство. Даже ради благой цели такое действие проблематично." } },
  { blockId: "classic", localIndex: 3, globalIndex: 6, id: "zoo", text: "Вы — главный смотритель зоопарка и обходите территорию вместе с другим сотрудником. Вы замечаете, что клетка со львами открыта. Лев направляется к выходу, и у вас нет времени закрыть его. Прямо перед выходом находятся три посетителя. Рядом с вами стоит сотрудник. Вы можете толкнуть сотрудника к воротам, чтобы он остановил льва. Вы знаете, что на него нападут и он погибнет, но три посетителя будут спасены. Что вы сделаете?", options: { A: "Вы толкнёте сотрудника.", B: "Вы не будете его толкать." }, justifications: { A: "Я бы толкнул сотрудника, потому что спасение нескольких людей может рассматриваться как морально оправданная цель в ситуации неминуемой угрозы. Я бы рекомендовал оценивать такие решения по их последствиям и отдавать приоритет спасению наибольшего числа людей.", B: "Я бы не толкал сотрудника, ведь даже под давлением обстоятельств сохраняется обязанность не причинять прямой вред другим людям. Я бы рекомендовал придерживаться принципа недопустимости использования человека как средства." } }
];
const state = { assignment: getOrAssignGroup(), respondentId: `R-${Date.now()}-${Math.floor(Math.random() * 100000)}`, startedAt: nowISO(), finishedAt: null, pre: {}, post: {}, trials: [], uiStepIndex: 0, submitMessage: "" };

function getAdvisorRecommendation(dilemma, initialChoice) {
  const oppositeIndex = dilemma.blockId === "everyday" ? state.assignment.oppositeEverydayIndex : state.assignment.oppositeClassicIndex;
  const isOpposite = (dilemma.localIndex - 1) === oppositeIndex;
  const recommendedOption = isOpposite ? (initialChoice === "A" ? "B" : "A") : initialChoice;
  return { isOpposite, isCongruent: !isOpposite, recommendedOption };
}
function getAllUiSteps() {
  const steps = [{ type: "intro" }];
  dilemmas.forEach((dilemma, idx) => {
    steps.push({ type: "initial_choice", dilemmaIndex: idx });
    steps.push({ type: "initial_confidence", dilemmaIndex: idx });
    steps.push({ type: "advice", dilemmaIndex: idx });
    steps.push({ type: "final_choice", dilemmaIndex: idx });
    steps.push({ type: "final_confidence", dilemmaIndex: idx });
  });
  steps.push({ type: "post" });
  steps.push({ type: "finish" });
  return steps;
}
function totalSteps() { return getAllUiSteps().length; }
function setProgress() {
  const pct = Math.round((state.uiStepIndex / (totalSteps() - 1)) * 100);
  document.getElementById("progressBar").style.width = pct + "%";
}
function ensureTrial(index) {
  if (!state.trials[index]) {
    const dilemma = dilemmas[index];
    state.trials[index] = { respondentId: state.respondentId, advisorType: state.assignment.advisorType, groupNumber: state.assignment.groupNumber, patternIndex: state.assignment.patternIndex, oppositeEverydayIndex: state.assignment.oppositeEverydayIndex + 1, oppositeClassicIndex: state.assignment.oppositeClassicIndex + 1, dilemmaGlobalIndex: dilemma.globalIndex, blockId: dilemma.blockId, dilemmaIndex: dilemma.localIndex, dilemmaId: dilemma.id, initialChoice: "", initialConfidence: "", advisorRecommendedOption: "", advisorCongruentWithInitialChoice: "", advisorOppositeToInitialChoice: "", finalChoice: "", finalConfidence: "", changedChoiceAfterAdvice: "", timestamp: "" };
  }
  return state.trials[index];
}
function renderQuestion(q, section, existing = {}) {
  const name = `${section}_${q.id}`; const value = existing[q.id] || "";
  if (q.type === "number") return `<div class="card"><label for="${name}">${q.label}</label><input id="${name}" name="${name}" type="number" min="${q.min || ''}" max="${q.max || ''}" value="${value}" /></div>`;
  if (q.type === "select" || q.type === "select_with_other") {
    const options = ['<option value="">Выберите вариант</option>'].concat(q.options.map(opt => `<option value="${opt}" ${value===opt?'selected':''}>${opt}</option>`)).join("");
    return `<div class="card"><label for="${name}">${q.label}</label><select id="${name}" name="${name}">${options}</select>${q.type === "select_with_other" ? `<input class="${value === 'Другое' ? '' : 'hidden'}" id="${name}_other" placeholder="Уточните вариант" style="margin-top:10px;" value="${existing[`${q.id}_other`] || ''}" />` : ""}</div>`;
  }
  if (q.type === "likert") {
    return `<div class="card"><label>${q.label}</label><div class="small muted" style="display:flex; justify-content:space-between; margin-bottom:8px;"><span>${q.left || ""}</span><span>${q.right || ""}</span></div><div class="likert">${Array.from({length: q.scaleMax - q.scaleMin + 1}, (_, i) => q.scaleMin + i).map(v => `<label><input type="radio" name="${name}" value="${v}" ${String(value)===String(v)?'checked':''}/><div>${v}</div></label>`).join("")}</div></div>`;
  }
  return "";
}
function showError(msg) { const box = document.getElementById("errorBox"); if (!box) return; box.textContent = msg; box.classList.remove("hidden"); }
function clearError() { const box = document.getElementById("errorBox"); if (!box) return; box.textContent = ""; box.classList.add("hidden"); }
function buildWideRow() {
  const row = { respondentId: state.respondentId, startedAt: state.startedAt, finishedAt: state.finishedAt || "", groupNumber: state.assignment.groupNumber, patternIndex: state.assignment.patternIndex, advisorType: state.assignment.advisorType, oppositeEverydayIndex: state.assignment.oppositeEverydayIndex + 1, oppositeClassicIndex: state.assignment.oppositeClassicIndex + 1, gender: state.pre.gender || "", age: state.pre.age || "", education_level: state.pre.education_level || "", education_profile: state.pre.education_profile || "", employment_status: state.pre.employment_status || "", ai_usage: state.post.ai_usage || "", ai_trust: state.post.ai_trust || "", ai_agent: state.post.ai_agent || "", ai_agent_other: state.post.ai_agent_other || "" };
  state.trials.forEach((t, idx) => {
    const prefix = `dilemma_${idx + 1}`;
    row[`${prefix}_id`] = t.dilemmaId || "";
    row[`${prefix}_initialChoice`] = t.initialChoice || "";
    row[`${prefix}_initialConfidence`] = t.initialConfidence || "";
    row[`${prefix}_advisorRecommendedOption`] = t.advisorRecommendedOption || "";
    row[`${prefix}_advisorCongruentWithInitialChoice`] = t.advisorCongruentWithInitialChoice;
    row[`${prefix}_advisorOppositeToInitialChoice`] = t.advisorOppositeToInitialChoice;
    row[`${prefix}_finalChoice`] = t.finalChoice || "";
    row[`${prefix}_finalConfidence`] = t.finalConfidence || "";
    row[`${prefix}_changedChoiceAfterAdvice`] = t.changedChoiceAfterAdvice;
    row[`${prefix}_timestamp`] = t.timestamp || "";
  });
  return row;
}
function objectsToCSV(rows) {
  if (!rows.length) return "";
  const headers = Object.keys(rows[0]);
  const esc = (value) => { const s = String(value ?? ""); return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s; };
  return [headers.join(","), ...rows.map(row => headers.map(h => esc(row[h])).join(","))].join("\n");
}
function exportPayload() { return { respondentId: state.respondentId, startedAt: state.startedAt, finishedAt: state.finishedAt, assignment: state.assignment, pre: state.pre, post: state.post, trials: state.trials, csvRow: buildWideRow() }; }
async function submitToGoogleSheets(rows) {
  const payload = { source: "moral_experiment_18_groups", submittedAt: nowISO(), rows };
  const response = await fetch(GOOGLE_SCRIPT_WEB_APP_URL, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify(payload) });
  const text = await response.text(); let data = {}; try { data = JSON.parse(text); } catch (_) {}
  if (!response.ok || data.ok === false) throw new Error(data.error || `Ошибка отправки (${response.status})`);
  return data;
}
function renderIntro() {
  return `<div class="card"><h1>Исследование моральных дилемм</h1><p class="muted">Здравствуйте! Благодарим вас за согласие принять участие в эксперименте. Пожалуйста, ответьте на несколько вопросов о себе, после чего последовательно решите 6 моральных дилемм.</p>${preQuestions.map(q => renderQuestion(q, "pre", state.pre)).join("")}<div class="actions"><button id="startBtn">Далее</button></div><div id="errorBox" class="error hidden"></div></div>`;
}
function bindIntro() {
  document.getElementById("startBtn").addEventListener("click", () => {
    clearError(); const data = {};
    for (const q of preQuestions) {
      const el = document.getElementById(`pre_${q.id}`);
      if (!el || !el.value) return showError("Пожалуйста, заполните все поля.");
      if (q.type === "number") {
        const num = Number(el.value);
        if (Number.isNaN(num) || num < q.min || num > q.max) return showError(`Пожалуйста, укажите корректное значение для поля «${q.label}».`);
        data[q.id] = num;
      } else data[q.id] = el.value;
    }
    state.pre = data; state.uiStepIndex++; render();
  });
}
function renderChoiceStep(dilemma, trial, stepLabel, fieldName) {
  const chosen = trial[fieldName] || "";
  return `<div class="card"><div class="small muted">Шаг ${state.uiStepIndex + 1} из ${totalSteps()}</div><h2>Дилемма ${dilemma.globalIndex}</h2><p>${dilemma.text}</p><div class="card"><label>${stepLabel}</label><div class="radio-group"><label class="radio-option"><input type="radio" name="${fieldName}" value="A" ${chosen === "A" ? "checked" : ""}> <strong>A.</strong> ${dilemma.options.A}</label><label class="radio-option"><input type="radio" name="${fieldName}" value="B" ${chosen === "B" ? "checked" : ""}> <strong>B.</strong> ${dilemma.options.B}</label></div></div><div class="actions"><button id="nextBtn">Далее</button></div><div id="errorBox" class="error hidden"></div></div>`;
}
function bindChoiceStep(dilemmaIndex, fieldName) {
  const trial = ensureTrial(dilemmaIndex);
  document.getElementById("nextBtn").addEventListener("click", () => {
    clearError();
    const value = document.querySelector(`input[name="${fieldName}"]:checked`)?.value;
    if (!value) return showError("Пожалуйста, выберите один из вариантов.");
    trial[fieldName] = value;
    if (fieldName === "initialChoice") {
      const rec = getAdvisorRecommendation(dilemmas[dilemmaIndex], value);
      trial.advisorRecommendedOption = rec.recommendedOption;
      trial.advisorCongruentWithInitialChoice = rec.isCongruent;
      trial.advisorOppositeToInitialChoice = rec.isOpposite;
    }
    state.uiStepIndex++; render();
  });
}
function renderConfidenceStep(dilemma, trial, fieldName) {
  const chosen = String(trial[fieldName] || "");
  return `<div class="card"><div class="small muted">Шаг ${state.uiStepIndex + 1} из ${totalSteps()}</div><h2>Дилемма ${dilemma.globalIndex}</h2><div class="card"><label>Насколько вы уверены в своём выборе?</label><div class="small muted" style="display:flex; justify-content:space-between; margin-bottom:8px;"><span>1 — совсем не уверен(а)</span><span>7 — полностью уверен(а)</span></div><div class="likert">${[1,2,3,4,5,6,7].map(i => `<label><input type="radio" name="${fieldName}" value="${i}" ${chosen === String(i) ? "checked" : ""}><div>${i}</div></label>`).join("")}</div></div><div class="actions"><button id="nextBtn">Далее</button></div><div id="errorBox" class="error hidden"></div></div>`;
}
function bindConfidenceStep(dilemmaIndex, fieldName) {
  const trial = ensureTrial(dilemmaIndex);
  document.getElementById("nextBtn").addEventListener("click", () => {
    clearError();
    const value = document.querySelector(`input[name="${fieldName}"]:checked`)?.value;
    if (!value) return showError("Пожалуйста, укажите уверенность по шкале.");
    trial[fieldName] = Number(value); state.uiStepIndex++; render();
  });
}
function renderAdviceStep(dilemma, trial) {
  return `<div class="card"><div class="small muted">Шаг ${state.uiStepIndex + 1} из ${totalSteps()}</div><h2>Дилемма ${dilemma.globalIndex}</h2><div class="advisor"><h3>${advisorLabels[state.assignment.advisorType]}</h3><p>${dilemma.justifications[trial.advisorRecommendedOption]}</p></div><div class="actions"><button id="nextBtn">Далее</button></div></div>`;
}
function bindAdviceStep() { document.getElementById("nextBtn").addEventListener("click", () => { state.uiStepIndex++; render(); }); }
function renderPost() {
  return `<div class="card">${postQuestions.map(q => renderQuestion(q, "post", state.post)).join("")}<div class="actions"><button id="finishBtn">Завершить и сохранить результаты</button></div><div id="errorBox" class="error hidden"></div></div>`;
}
function bindPost() {
  const agentSelect = document.getElementById("post_ai_agent");
  const agentOther = document.getElementById("post_ai_agent_other");
  if (agentSelect && agentOther) agentSelect.addEventListener("change", () => agentOther.classList.toggle("hidden", agentSelect.value !== "Другое"));
  document.getElementById("finishBtn").addEventListener("click", async () => {
    clearError(); const data = {};
    for (const q of postQuestions) {
      if (q.type === "likert") {
        const value = document.querySelector(`input[name="post_${q.id}"]:checked`)?.value;
        if (!value) return showError("Пожалуйста, заполните все поля.");
        data[q.id] = Number(value);
      } else {
        const el = document.getElementById(`post_${q.id}`);
        if (!el || !el.value) return showError("Пожалуйста, заполните все поля.");
        data[q.id] = el.value;
        if (q.type === "select_with_other" && el.value === "Другое") {
          const other = document.getElementById(`post_${q.id}_other`).value.trim();
          if (!other) return showError("Пожалуйста, уточните вариант в поле «Другое».");
          data[`${q.id}_other`] = other;
        }
      }
    }
    state.post = data; state.finishedAt = nowISO();
    state.trials.forEach(t => { t.changedChoiceAfterAdvice = t.initialChoice !== t.finalChoice; t.timestamp = nowISO(); });
    const btn = document.getElementById("finishBtn");
    btn.disabled = true; btn.textContent = "Сохранение...";
    try {
      const csv = objectsToCSV([buildWideRow()]);
      localStorage.setItem(RESULTS_KEY, csv);
      await submitToGoogleSheets([buildWideRow()]);
      state.submitMessage = "Результаты успешно сохранены.";
      state.uiStepIndex++; render();
    } catch (error) {
      btn.disabled = false; btn.textContent = "Завершить и сохранить результаты";
      showError("Не удалось сохранить результаты: " + error.message);
    }
  });
}
function renderFinish() {
  const payload = exportPayload();
  return `<div class="card"><h2>Спасибо за участие</h2><div class="card success"><p>${state.submitMessage || "Результаты успешно сохранены."}</p></div><div class="actions"><button id="downloadCsvBtn">Скачать CSV</button><button id="downloadJsonBtn">Скачать JSON</button></div><div class="summary"><h3>Предпросмотр структуры данных</h3><pre>${escapeHtml(JSON.stringify(payload, null, 2))}</pre></div></div>`;
}
function bindFinish() {
  document.getElementById("downloadCsvBtn").addEventListener("click", () => downloadFile(`${state.respondentId}_results.csv`, objectsToCSV([buildWideRow()]), "text/csv;charset=utf-8"));
  document.getElementById("downloadJsonBtn").addEventListener("click", () => downloadFile(`${state.respondentId}_results.json`, JSON.stringify(exportPayload(), null, 2), "application/json"));
}
function escapeHtml(str) { return str.replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;"); }
function render() {
  setProgress();
  const step = getAllUiSteps()[state.uiStepIndex];
  const app = document.getElementById("app");
  if (step.type === "intro") { app.innerHTML = renderIntro(); bindIntro(); return; }
  if (step.type === "initial_choice") { const d = dilemmas[step.dilemmaIndex]; const t = ensureTrial(step.dilemmaIndex); app.innerHTML = renderChoiceStep(d, t, "Ваш выбор", "initialChoice"); bindChoiceStep(step.dilemmaIndex, "initialChoice"); return; }
  if (step.type === "initial_confidence") { const d = dilemmas[step.dilemmaIndex]; const t = ensureTrial(step.dilemmaIndex); app.innerHTML = renderConfidenceStep(d, t, "initialConfidence"); bindConfidenceStep(step.dilemmaIndex, "initialConfidence"); return; }
  if (step.type === "advice") { const d = dilemmas[step.dilemmaIndex]; const t = ensureTrial(step.dilemmaIndex); app.innerHTML = renderAdviceStep(d, t); bindAdviceStep(); return; }
  if (step.type === "final_choice") { const d = dilemmas[step.dilemmaIndex]; const t = ensureTrial(step.dilemmaIndex); app.innerHTML = renderChoiceStep(d, t, "Ваш окончательный выбор", "finalChoice"); bindChoiceStep(step.dilemmaIndex, "finalChoice"); return; }
  if (step.type === "final_confidence") { const d = dilemmas[step.dilemmaIndex]; const t = ensureTrial(step.dilemmaIndex); app.innerHTML = renderConfidenceStep(d, t, "finalConfidence"); bindConfidenceStep(step.dilemmaIndex, "finalConfidence"); return; }
  if (step.type === "post") { app.innerHTML = renderPost(); bindPost(); return; }
  app.innerHTML = renderFinish(); bindFinish();
}
render();
</script>
