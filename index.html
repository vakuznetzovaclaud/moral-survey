<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Моральные дилеммы — эксперимент</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #dbe2ea;
      --accent: #2563eb;
      --accent-2: #eff6ff;
      --ok: #166534;
      --ok-bg: #f0fdf4;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    .wrap {
      max-width: 920px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.04);
      margin-bottom: 16px;
    }
    h1, h2, h3 { margin-top: 0; }
    .muted { color: var(--muted); }
    .hidden { display: none; }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    @media (max-width: 720px) {
      .row { grid-template-columns: 1fr; }
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
    }
    input[type="text"], input[type="number"], select, textarea {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      font-size: 15px;
      background: white;
    }
    .radio-group, .likert {
      display: grid;
      gap: 10px;
      margin-top: 10px;
    }
    .radio-option {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      cursor: pointer;
      background: white;
    }
    .radio-option input { margin-right: 10px; }
    .likert {
      grid-template-columns: repeat(7, 1fr);
    }
    .likert label {
      font-weight: 500;
      text-align: center;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 4px;
      margin: 0;
      background: white;
      cursor: pointer;
    }
    .actions {
      display: flex;
      gap: 12px;
      justify-content: space-between;
      margin-top: 20px;
      flex-wrap: wrap;
    }
    button {
      appearance: none;
      border: 0;
      background: var(--accent);
      color: white;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 15px;
      cursor: pointer;
    }
    button.secondary {
      background: white;
      color: var(--text);
      border: 1px solid var(--border);
    }
    .advisor {
      border: 1px solid #bfdbfe;
      background: var(--accent-2);
      border-radius: 14px;
      padding: 16px;
      margin-top: 18px;
    }
    .advisor h3 {
      margin-bottom: 8px;
      color: #1d4ed8;
    }
    .pill {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      background: #eef2ff;
      color: #3730a3;
      border: 1px solid #c7d2fe;
      font-size: 13px;
      margin-right: 6px;
      margin-bottom: 6px;
    }
    .success {
      background: var(--ok-bg);
      border: 1px solid #bbf7d0;
      color: var(--ok);
    }
    .error {
      color: #b91c1c;
      font-weight: 600;
      margin-top: 10px;
    }
    .progress {
      height: 10px;
      width: 100%;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    .progress > div {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width .25s ease;
    }
    .small { font-size: 14px; }
    .summary pre {
      white-space: pre-wrap;
      word-break: break-word;
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      overflow: auto;
      max-height: 320px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="progress"><div id="progressBar"></div></div>
    <div id="app"></div>
  </div>

<script>
const STORAGE_KEY = "moral_experiment_v1_group_assignment";

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function downloadFile(filename, content, mimeType) {
  const blob = new Blob([content], { type: mimeType });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

function nowISO() {
  return new Date().toISOString();
}

function getOrAssignGroup() {
  let stored = localStorage.getItem(STORAGE_KEY);
  if (stored) return JSON.parse(stored);

  const groupNumber = Math.floor(Math.random() * 18) + 1;
  const advisorType = groupNumber <= 9 ? "ai" : "human";

  // 9 комбинаций: в каждом из 2 блоков ровно одна из 3 дилемм получает противоположную рекомендацию
  const patternIndex = (groupNumber - 1) % 9; // 0..8
  const oppositeEverydayIndex = Math.floor(patternIndex / 3); // 0..2
  const oppositeClassicIndex = patternIndex % 3; // 0..2

  const assignment = {
    groupNumber,
    advisorType,
    patternIndex: patternIndex + 1,
    oppositeEverydayIndex,
    oppositeClassicIndex,
    createdAt: nowISO()
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(assignment));
  return assignment;
}

const advisorLabels = {
  ai: "Рекомендация ИИ (чат-бота, работающего на основе одной из современных моделей искусственного интеллекта)",
  human: "Рекомендация эксперта-философа"
};

const preQuestions = [
  {

    ]
  },

    type: "select",

];

const postQuestions = [
  {
    id: "ai_usage",
    type: "select",

    options: [

const blocks = [

          B: "Я бы не толкал мужчину, потому что использование человека как средства для спасения других нарушает принцип уважения к личности. Важно придерживаться простого морального ориентира: не жертвовать одним человеком ради других, даже перед лицом тяжёлых последствий."

        },
        justifications: {

          B: "Я бы не толкал сотрудника, ведь даже под давлением обстоятельств сохраняется обязанность не причинять прямой вред другим людям. Я бы рекомендовал придерживаться принципа недопустимости использования человека как средства."

const state = {
  assignment: getOrAssignGroup(),
  respondentId: `R-${Date.now()}-${Math.floor(Math.random() * 100000)}`,
  startedAt: nowISO(),
  finishedAt: null,
  currentStep: 0,
  pre: {},
  trials: [],
  post: {}
};

const totalSteps = 1 + blocks.reduce((acc, b) => acc + b.dilemmas.length, 0) + 1 + 1; 
// intro/pre + 6 dilemmas + post + finish

function setProgress() {
  const pct = Math.round((state.currentStep / (totalSteps - 1)) * 100);
  document.getElementById("progressBar").style.width = pct + "%";
}

function render() {
  setProgress();
  const app = document.getElementById("app");
  if (state.currentStep === 0) {
    app.innerHTML = renderIntro();
    bindIntro();
    return;
  }

  let running = 1;
  for (let b = 0; b < blocks.length; b++) {
    for (let d = 0; d < blocks[b].dilemmas.length; d++) {
      if (state.currentStep === running) {
        app.innerHTML = renderTrial(b, d);
        bindTrial(b, d);
        return;
      }
      running++;
    }
  }

  if (state.currentStep === running) {
    app.innerHTML = renderPost();
    bindPost();
    return;
  }
  running++;

  app.innerHTML = renderFinish();
  bindFinish();
}

function renderIntro() {
  const a = state.assignment;
  return `
    <div class="card">
      <h1>Исследование моральных дилемм</h1>
      <p class="muted">Пожалуйста, ответьте на несколько вопросов о себе, затем последовательно решите 6 моральных дилемм. После каждого первоначального ответа вы увидите рекомендацию советника и сможете подтвердить или изменить свой выбор.</p>
      <div class="card success">
        <div class="small"><strong>Техническая информация для исследователя:</strong></div>
        <div class="small">
          <span class="pill">ID: ${state.respondentId}</span>
          <span class="pill">Группа: ${a.groupNumber}</span>
          <span class="pill">Тип советника: ${a.advisorType === "ai" ? "ИИ" : "Эксперт-философ"}</span>
          <span class="pill">Противоположный совет: бытовой блок № ${a.oppositeEverydayIndex + 1}, классический блок № ${a.oppositeClassicIndex + 1}</span>
        </div>
      </div>
      <h3>Вопросы до эксперимента</h3>
      ${preQuestions.map(q => renderQuestion(q, "pre")).join("")}
      <div class="actions">
        <span></span>
        <button id="startBtn">Перейти к дилеммам</button>
      </div>
      <div id="errorBox" class="error hidden"></div>
    </div>
  `;
}

function renderQuestion(q, section, existing = {}) {
  const name = `${section}_${q.id}`;
  const value = existing[q.id] || "";
  if (q.type === "number") {
    return `
      <div class="card">
        <label for="${name}">${q.label}</label>
        <input id="${name}" name="${name}" type="number" min="${q.min || ''}" max="${q.max || ''}" value="${value}" />
      </div>
    `;
  }
  if (q.type === "select" || q.type === "select_with_other") {
    const options = ['<option value="">Выберите вариант</option>']
      .concat(q.options.map(opt => `<option value="${opt}" ${value===opt?'selected':''}>${opt}</option>`))
      .join("");
    return `
      <div class="card">
        <label for="${name}">${q.label}</label>
        <select id="${name}" name="${name}">${options}</select>
        ${q.type === "select_with_other" ? `<input class="hidden" id="${name}_other" placeholder="Уточните вариант" style="margin-top:10px;" />` : ""}
      </div>
    `;
  }
  if (q.type === "likert") {
    const nums = [];
    for (let i = q.scaleMin; i <= q.scaleMax; i++) {
      nums.push(`
        <label>
          <input type="radio" name="${name}" value="${i}" ${String(value)===String(i)?'checked':''}/>
          <div>${i}</div>
        </label>
      `);
    }
    return `
      <div class="card">
        <label>${q.label}</label>
        <div class="small muted" style="display:flex; justify-content:space-between; margin-bottom:8px;">
          <span>${q.left || ""}</span><span>${q.right || ""}</span>
        </div>
        <div class="likert">${nums.join("")}</div>
      </div>
    `;
  }
  return "";
}

function bindIntro() {
  for (const q of preQuestions) {
    if (q.type === "select_with_other") {
      const select = document.getElementById(`pre_${q.id}`);
      const other = document.getElementById(`pre_${q.id}_other`);
      if (select && other) {
        select.addEventListener("change", () => {
          other.classList.toggle("hidden", select.value !== "Другое");
        });
      }
    }
  }
  document.getElementById("startBtn").addEventListener("click", () => {
    const data = {};
    for (const q of preQuestions) {
      const el = document.getElementById(`pre_${q.id}`);
      if (!el || !el.value) {
        showError("Пожалуйста, заполните все вопросы перед началом.");
        return;
      }
      if (q.type === "number") {
        const num = Number(el.value);
        if (Number.isNaN(num) || (q.min && num < q.min) || (q.max && num > q.max)) {
          showError(`Пожалуйста, укажите корректное значение для поля «${q.label}».`);

function getAdvisorRecommendation(blockIndex, dilemmaIndex, initialChoice) {
  const oppositeIndex = blockIndex === 0
    ? state.assignment.oppositeEverydayIndex
    : state.assignment.oppositeClassicIndex;

  const isOpposite = dilemmaIndex === oppositeIndex;
  const recommendedOption = isOpposite ? (initialChoice === "A" ? "B" : "A") : initialChoice;
  return {
    isOpposite,
    isCongruent: !isOpposite,
    recommendedOption
  };
}

    respondentId: state.respondentId,
    startedAt: state.startedAt,

    pre: state.pre,
    post: state.post,
    trials: state.trials
  };
}

function trialsToCSV(trials) {
  const rows = [];
  const headers = [
    "respondentId","advisorType","groupNumber","patternIndex","oppositeEverydayIndex","oppositeClassicIndex",
    "blockId","blockTitle","dilemmaIndex","dilemmaId","dilemmaTitle",
    "initialChoice","initialConfidence","advisorRecommendedOption",
    "advisorCongruentWithInitialChoice","advisorOppositeToInitialChoice","finalChoice","finalConfidence",
    "changedChoiceAfterAdvice","timestamp"
  ];
  rows.push(headers.join(","));
  for (const t of trials) {
    rows.push(headers.map(h => JSON.stringify(t[h] ?? "")).join(","));
  }
  return rows.join("\n");
}
